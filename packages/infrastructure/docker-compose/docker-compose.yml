---
services:
  abc-server:
    image: registry.gitlab.com/abc-map/abc-map/server:${ABCMAP_SERVER_TAG}
    container_name: abc-server
    restart: on-failure
    ports:
      - '10082:10082'
    networks:
      - abc-map
    environment:
      ABC_CONFIGURATION: /srv/config/config.mjs
    healthcheck:
      test: ['CMD', 'wget', '-O', '-', 'http://0.0.0.0:10082/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - './config.mjs:/srv/config/config.mjs'
      - './datastore:/srv/datastore'

  abc-mongodb:
    image: 'mongo:7'
    container_name: abc-mongodb
    restart: on-failure
    ports:
      - '27017:27017'
    networks:
      - abc-map
    environment:
      MONGO_INITDB_ROOT_USERNAME: '${MONGODB_USER}'
      MONGO_INITDB_ROOT_PASSWORD: '${MONGODB_PASSWORD}'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 6
    volumes:
      - './mongodb-data:/data/db'

  abc-mongo-express:
    image: 'mongo-express:1.0.2-20-alpine3.19'
    container_name: abc-mongo-express
    restart: on-failure
    ports:
      - '8081:8081'
    networks:
      - abc-map
    healthcheck:
      test: ['CMD', 'wget', '-O', '-', 'http://0.0.0.0:8081/status']
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: '${MONGOEXPRESS_USERNAME}'
      ME_CONFIG_BASICAUTH_PASSWORD: '${MONGOEXPRESS_USERNAME}'
      ME_CONFIG_MONGODB_ENABLE_ADMIN: 'true'
      ME_CONFIG_MONGODB_URL: 'mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@abc-mongodb:27017/?ssl=false'

  # See https://github.com/namshi/docker-smtp/blob/master/docker-compose.yml for more parameters
  abc-smtp:
    image: namshi/smtp
    container_name: abc-smtp
    restart: always
    networks:
      - abc-map

  # autoheal restart unhealthy servers, see https://hub.docker.com/r/willfarrell/autoheal/
  autoheal:
    restart: always
    image: willfarrell/autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  abc-map:
