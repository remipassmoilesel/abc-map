{{- if .Values.mongoexpress.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "abc-map.fullname" . }}-mongoexpress
  labels:
    {{- include "abc-map.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "abc-map.name" . }}-mongoexpress
      app.kubernetes.io/instance: {{ .Release.Name }}-mongoexpress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "abc-map.name" . }}-mongoexpress
        app.kubernetes.io/instance: {{ .Release.Name }}-mongoexpress
    spec:
      containers:
        - name: mongoexpress
          image: "mongo-express:1.0.2-20-alpine3.19"
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongoexpress
              containerPort: 8081
              protocol: TCP
          env:
            - name: ME_CONFIG_BASICAUTH_USERNAME
              value: {{ .Values.mongoexpress.username }}
            - name: ME_CONFIG_BASICAUTH_PASSWORD
              value: {{ .Values.mongoexpress.password }}
            - name: ME_CONFIG_MONGODB_ENABLE_ADMIN
              value: "true"
            - name: ME_CONFIG_MONGODB_URL
              value: "mongodb://{{ .Values.mongodb.auth.rootUsername }}:{{ .Values.mongodb.auth.rootPassword }}@{{ include "abc-map.fullname" . }}-mongodb:27017/?ssl=false"
          startupProbe:
            httpGet:
              path: /status
              port: 8081
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /status
              port: 8081
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /status
              port: 8081
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mongoexpress.resources | nindent 12 }}

      {{- with .Values.mongoexpress.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.mongoexpress.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.mongoexpress.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  {{- end }}
